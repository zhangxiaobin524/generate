<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>学信档案 - 高等学籍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        }

        /* 桌面端 */
        .page-wrapper {
            width: 100%;
            min-height: 100%;
            overflow-x: auto;
        }

        .page-content {
            width: 1200px;
            min-height: 100vh;
            margin: 0 auto;
            background: #f5f5f5;
        }

        /* 手机端：等比缩放（完整显示电脑版效果） */
        @media screen and (max-width: 1200px) {
            html, body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                touch-action: none;
            }
            .page-wrapper {
                width: 100%;
                height: 100%;
                overflow: auto;
                -webkit-overflow-scrolling: touch;
            }
            .page-content {
                width: 1200px;
                transform: scale(calc(100vw / 1200));
                transform-origin: 0 0;
                margin: 0 auto;
            }
        }

        /* ===== 顶部栏 ===== */
        .header {
            background: #2db475;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 40px;
        }
        .header-inner {
            width: 1180px;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        
        /* 主导航 */
        .main-nav {
            display: flex;
            align-items: center;
            margin-left: 30px;
            gap: 0;
        }
        .nav-item {
            color: rgba(255,255,255,0.9);
            padding: 0 15px;
            font-size: 14px;
            cursor: pointer;
            height: 60px;
            line-height: 60px;
            position: relative;
            text-decoration: none;
        }
        .nav-item:hover {
            color: white;
        }
        .nav-item.active {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 6px solid white;
        }

        /* ===== 子导航 ===== */
        .sub-nav {
            background: white;
            height: 45px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid #e0e0e0;
        }
        .sub-nav-inner {
            width: 1180px;
            margin: 0 auto;
            display: flex;
            gap: 30px;
        }
        .sub-item {
            color: #666;
            font-size: 14px;
            cursor: pointer;
            height: 45px;
            line-height: 45px;
            text-decoration: none;
        }
        .sub-item:hover {
            color: #2db475;
        }
        .sub-item.active {
            color: #2db475;
            border-bottom: 2px solid #2db475;
        }

        /* ===== 主内容区 ===== */
        .main-content {
            width: 1180px;
            margin: 20px auto;
            padding: 0;
        }

        /* 信息栏 */
        .info-bar {
            background: #5cb85c;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* 报告区块 */
        .report-block {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
        }
        .block-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .block-title::before {
            content: '✓';
            width: 18px;
            height: 18px;
            background: #5cb85c;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* 表格 */
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .report-table th {
            background: #f5f5f5;
            padding: 12px 15px;
            text-align: left;
            font-weight: 500;
            color: #333;
            border-bottom: 1px solid #ddd;
        }
        .report-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            color: #333;
        }
        .report-table tr:last-child td {
            border-bottom: none;
        }
        .code-link {
            color: #2db475;
            text-decoration: none;
        }
        .code-link:hover {
            text-decoration: underline;
        }
        .action-link {
            color: #2db475;
            text-decoration: none;
            margin-right: 15px;
        }
        .action-link:hover {
            text-decoration: underline;
        }
        .action-link.gray {
            color: #999;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            color: #999;
            line-height: 2;
        }
        .footer a {
            color: #999;
            text-decoration: none;
        }
        .footer a:hover {
            color: #2db475;
        }
    </style>
</head>
<body>
<div class="page-wrapper">
<div class="page-content">

    <!-- 顶部导航 -->
    <div class="header">

    <!-- 子导航 -->
    <div class="sub-nav">

            <a href="report-list.html" class="sub-item active">高等学籍</a>

    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <!-- 信息栏 -->
        <div class="info-bar">

        <!-- 报告区块 -->

        </div>
    </div>

    <!-- 底部 -->
    <div class="footer">

</div>
</div>

</html>
<script>
    // 登录检查 + 加载用户数据
    (function() {
        var uid = localStorage.getItem('xuexin_user_id');
        var name = localStorage.getItem('xuexin_user_name');
        if (!uid) {
            window.location.href = 'login.html';
            return;
        }
        // 加载用户信息到页面
        fetch('http://127.0.0.1:9002/api/user/' + uid).then(function(r) { return r.json(); }).then(function(data) {
            if (data.code !== 0 || !data.data) return;
            var u = data.data;
            // 更新信息栏
            var bar = document.querySelector('.info-bar');
            if (bar) bar.textContent = u.level + ' - ' + u.school + ' - ' + u.major;
            // 更新验证码
            var codeLink = document.querySelector('.code-link');
            if (codeLink) codeLink.textContent = u.verify_code;
        }).catch(function(e) { console.warn('加载用户数据失败', e); });
    })();

    (function() {
        if (window.innerWidth > 1200) return;
        var scale = window.innerWidth / 1200;
        var content = document.querySelector('.page-content');
        if (content) {
            content.style.transform = 'scale(' + scale + ')';
            content.style.transformOrigin = '0 0';
            content.style.width = '1200px';
        }
    })();
</script>
