services:
  mysql:
    image: mysql:8.0
    container_name: xuexin-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: xuexin
    ports:
      - "9001:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./server
    container_name: xuexin-backend
    ports:
      - "9002:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: xuexin
    restart: unless-stopped

  frontend:
    build: .
    container_name: xuexin-report
    ports:
      - "9003:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
