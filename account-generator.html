<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>账号生成 - 学信档案</title>
    <script src="static/html2canvas.min.js" defer></script>
    <script src="static/jspdf.umd.min.js" defer></script>
    <script src="static/qrcode.min.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #FAFCFB;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 520px; margin: 0 auto; }
        h2 { text-align: center; color: #2db475; margin-bottom: 20px; font-size: 22px; }
        .card {
            background: white; border-radius: 14px; padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px;
        }
        .card h3 { font-size: 16px; color: #333; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; margin-top: 14px; }
        input, select {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; outline: none;
        }
        input:focus, select:focus { border-color: #2db475; }

        /* 表单卡片容器 */
        .forms-container { display: flex; flex-direction: column; gap: 16px; }

        /* 单个表单卡片 */
        .form-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            background: #fafcfa;
        }
        .form-card .card-index {
            font-size: 14px;
            font-weight: 600;
            color: #2db475;
            margin-bottom: 10px;
        }

        /* 上传区域 */
        .photo-upload-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .photo-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .photo-col {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .photo-col label { margin-bottom: 0; }
        .photo-col .photo-preview {
            width: 100%; height: 130px;
        }
        .photo-preview {
            width: 72px; height: 90px;
            border: 2px dashed #ddd; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; font-size: 10px;
            overflow: hidden; background: #f5f5f5; flex-shrink: 0;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .photo-preview:hover { border-color: #2db475; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .photo-preview .upload-hint { text-align: center; line-height: 1.4; }
        .photo-preview .upload-hint .icon { font-size: 20px; display: block; }

        /* 添加按钮 */
        .add-btn-wrap { margin-top: 12px; text-align: center; }
        .add-btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 4px;
            padding: 10px 18px; background: #ffffff; color: #2db475;
            border: 1px solid #2db475; border-radius: 10px;
            font-size: 14px; cursor: pointer; font-weight: 500;
            line-height: 1; transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(45, 180, 117, 0.05);
        }
        .add-btn .icon {
            font-size: 16px; font-weight: 400; line-height: 1;
            margin-right: 2px;
        }
        .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .add-btn:hover:not(:disabled) {
            background: #2db475; color: #ffffff;
            box-shadow: 0 2px 6px rgba(45, 180, 117, 0.25);
        }

        /* 删除按钮 */
        .remove-btn {
            float: right;
            padding: 4px 12px; background: #ff4444; color: white;
            border: none; border-radius: 4px; font-size: 11px; cursor: pointer;
        }
        .remove-btn:hover { background: #e03030; }

        .btn {
            display: block;
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .btn-green { background: #2db475; color: white; margin-top: 12px; }
        .btn-green:hover { background: #25a065; }
        .btn-green:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-small {
            padding: 6px 14px; font-size: 12px; border-radius: 6px;
            background: #2db475; color: white; border: none; cursor: pointer;
        }
        .btn-small:hover { background: #25a065; }
        .btn-login {
            display: inline-block; margin-top: 10px; color: #2db475;
            text-decoration: none; font-size: 14px; font-weight: 500;
        }
        .btn-login:hover { text-decoration: underline; }

        /* 生成结果 */
        .results-area {
            margin-top: 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .result-item {
            padding: 14px; background: #f0faf5; border-radius: 10px;
            border: 1px solid #d4edda;
        }
        .result-item .r-name { font-weight: 600; color: #2db475; font-size: 14px; margin-bottom: 6px; }
        .result-item .r-detail { font-size: 12px; color: #555; line-height: 1.6; }
        .result-item .r-actions { margin-top: 8px; display: flex; gap: 8px; }
        .result-item .r-actions button {
            flex: 1; padding: 8px; border: none; border-radius: 6px;
            font-size: 12px; font-weight: 500; cursor: pointer;
        }
        .result-item .r-copy { background: #2db475; color: white; }
        .result-item .r-dl { background: #555; color: white; }

        /* 账号列表 */
        .account-list { margin-top: 12px; }
        .acc-item {
            display: flex; align-items: center; padding: 10px 12px;
            background: #fafafa; border-radius: 8px; margin-bottom: 6px; border: 1px solid #eee;
            gap: 10px;
        }
        .acc-item .avatar {
            width: 36px; height: 36px; border-radius: 50%; background: #eee;
            overflow: hidden; flex-shrink: 0;
        }
        .acc-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .acc-item .info { flex: 1; min-width: 0; }
        .acc-item .name { font-size: 14px; font-weight: 600; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .acc-item .detail { font-size: 12px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .acc-actions {
            display: flex; align-items: center; gap: 4px; flex-shrink: 0;
        }
        .acc-item .acc-actions button {
            width: 30px; height: 30px; padding: 0;
            border: none; border-radius: 6px;
            color: white; font-size: 14px; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            line-height: 1;
        }
        .acc-item .del-btn { background: #ff4444; }
        .acc-item .copy-btn { background: #2db475; }
        .acc-item .dl-btn { background: #555; }
        .acc-item .edit-btn { background: #f0a040; }
        .acc-item .qr-btn { background: #5b8def; }
        .empty-tip { text-align: center; color: #ccc; font-size: 13px; padding: 20px; }

        /* 分页 */
        #pagination { margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
        #pagination button {
            padding: 5px 12px; border: 1px solid #ddd; border-radius: 4px;
            background: #fff; color: #333; font-size: 12px; cursor: pointer;
        }
        #pagination button:hover:not(:disabled) { background: #f0f0f0; }
        #pagination button:disabled { color: #ccc; cursor: not-allowed; }

        /* 图片预览弹窗（支付宝长按保存） */
        .img-preview-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 99999;
            align-items: center; justify-content: center; flex-direction: column;
            padding: 20px; box-sizing: border-box;
        }
        .img-preview-overlay.show { display: flex; }
        .img-preview-overlay img {
            max-width: 100%; max-height: 80vh; border-radius: 4px;
            -webkit-user-select: auto; user-select: auto;
            -webkit-touch-callout: default;
        }
        .img-preview-tip {
            color: #fff; font-size: 14px; margin-top: 16px; text-align: center; line-height: 1.6;
        }
        .img-preview-close {
            margin-top: 12px; padding: 8px 24px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.5); background: transparent;
            color: #fff; font-size: 14px; cursor: pointer;
        }

        /* 二维码弹窗 */
        .qr-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 9999;
            align-items: center; justify-content: center;
        }
        .qr-overlay.show { display: flex; }
        .qr-dialog {
            background: white; border-radius: 14px; padding: 30px 24px 24px;
            text-align: center; max-width: 320px; width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .qr-dialog h4 { font-size: 16px; color: #333; margin-bottom: 4px; }
        .qr-dialog .qr-sub { font-size: 12px; color: #999; margin-bottom: 16px; }
        .qr-dialog canvas { display: block; margin: 0 auto; border: 1px solid #eee; border-radius: 8px; padding: 8px; }
        .qr-dialog .qr-url { 
            font-size: 11px; color: #888; margin-top: 12px; word-break: break-all; 
            background: #f5f5f5; padding: 6px 10px; border-radius: 6px; line-height: 1.4;
        }
        .qr-dialog .qr-close { 
            margin-top: 16px; padding: 8px 30px; background: #eee; color: #666;
            border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
        }
        .qr-dialog .qr-close:hover { background: #ddd; }

        /* 编辑弹窗 */
        .edit-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 10000;
            align-items: center; justify-content: center;
        }
        .edit-overlay.show { display: flex; }
        .edit-dialog {
            background: white; border-radius: 14px; padding: 24px;
            max-width: 400px; width: 90%; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .edit-dialog h4 { font-size: 17px; color: #333; margin-bottom: 16px; text-align: center; }
        .edit-dialog .edit-field { margin-bottom: 14px; }
        .edit-dialog .edit-field label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
        .edit-dialog .edit-field input[type=text] {
            width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; outline: none; box-sizing: border-box;
        }
        .edit-dialog .edit-photo-row { display: flex; gap: 12px; }
        .edit-dialog .edit-photo-item { flex: 1; text-align: center; }
        .edit-dialog .edit-photo-box {
            width: 72px; height: 90px; border: 2px dashed #ddd; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; font-size: 10px; overflow: hidden; background: #f5f5f5;
            cursor: pointer; margin: 0 auto 4px;
        }
        .edit-dialog .edit-photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .edit-dialog .edit-photo-box:hover { border-color: #2db475; }
        .edit-dialog .edit-btn-row { display: flex; gap: 10px; margin-top: 16px; }
        .edit-dialog .edit-btn-row button {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
        }
        .edit-dialog .edit-save { background: #2db475; color: white; }
        .edit-dialog .edit-save:hover { background: #25a065; }
        .edit-dialog .edit-cancel { background: #eee; color: #666; }
        .edit-dialog .edit-cancel:hover { background: #ddd; }

        /* 生成进度 */
        .progress-bar-wrap {
            display: none;
            margin-top: 16px;
        }
        .progress-bar {
            height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: #2db475; border-radius: 3px;
            transition: width 0.3s; width: 0%;
        }
        .progress-text { font-size: 12px; color: #888; text-align: center; margin-top: 6px; }
        .progress-text .pname { color: #333; font-weight: 500; }

        /* 隐藏的文件输入 */
        .file-input-hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="font-size:20px;">&#128203; 批量账号生成</h2>

    <div class="card">
        <h3>上传照片 &amp; 填写信息</h3>
        <p style="font-size:12px;color:#999;margin-bottom:10px;">可同时上传 1~2 张照片，每张照片独立生成一个账号</p>

        <div class="forms-container" id="formsContainer">
            <!-- 初始显示一张表单 -->
        </div>

        <div class="add-btn-wrap">
            <button class="add-btn" id="addFormBtn"><span class="icon">+</span>添加第二张照片</button>
        </div>

        <!-- 批量生成按钮 -->
        <button class="btn btn-green" id="generateBtn">&#9889; 批量生成账号</button>

        <!-- 进度条 -->
        <div class="progress-bar-wrap" id="progressWrap">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">正在生成 <span class="pname"></span></div>
        </div>

        <!-- 生成结果 -->
        <div class="results-area" id="resultsArea"></div>
    </div>

    <div class="card">
        <h3 style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
            <span>已生成账号 <span id="accountCount" style="color:#999;font-weight:400;"></span></span>
            <button class="btn-login" onclick="batchDeleteRecent()" style="cursor:pointer;border:2px dashed #f44336;background:transparent;color:#f44336;padding:5px 14px;border-radius:8px;font-size:12px;margin:0;">🗑️ 删除最老100条</button>
        </h3>
        <div style="margin-bottom:10px;">
            <input type="text" id="searchAccounts" placeholder="🔍 搜索姓名..." oninput="filterAccounts()" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;box-sizing:border-box;outline:none;" />
            <div id="searchResultTip" style="font-size:12px;color:#999;margin-top:4px;display:none;"></div>
        </div>
        <div id="accountList"><div class="empty-tip">暂无账号，请先生成一个</div></div>
        <div id="pagination" style="text-align:center;margin-top:10px;"></div>
        <div style="text-align:center;margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
            <button class="btn-login" onclick="copyAllNameId()" style="cursor:pointer;border:2px dashed #4CAF50;background:transparent;color:#4CAF50;padding:8px 20px;border-radius:8px;font-size:13px;">📋 一键复制全部姓名+号码</button>
        </div>
        <div style="text-align:center;margin-top:8px;">
            <a href="login.html" class="btn-login">&#8594; 去登录</a>
        </div>
    </div>
</div>

<!-- 二维码弹窗 -->
<div class="qr-overlay" id="qrOverlay" onclick="closeQR(event)">
    <div class="qr-dialog" onclick="event.stopPropagation()">
        <h4 id="qrName">扫码查看报告</h4>
        <div class="qr-sub">使用手机扫描二维码，直接查看学籍验证报告</div>
        <div id="qrCanvas"></div>
        <div class="qr-url" id="qrUrl"></div>
        <button class="qr-close" onclick="document.getElementById('qrOverlay').classList.remove('show')">关闭</button>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="edit-overlay" id="editOverlay" onclick="closeEditOverlay(event)">
    <div class="edit-dialog" onclick="event.stopPropagation()">
        <h4>编辑账号信息</h4>
        <input type="hidden" id="editId">
        <div class="edit-field">
            <label>姓名</label>
            <input type="text" id="editName">
        </div>
        <div class="edit-field">
            <label>身份证号</label>
            <input type="text" id="editIdCard">
        </div>
        <div class="edit-photo-row">
            <div class="edit-photo-item">
                <label style="font-size:12px;">现在照片</label>
                <div class="edit-photo-box" id="editPhotoNow" onclick="document.getElementById('editFileNow').click()">
                    <span style="line-height:90px;">📷</span>
                </div>
                <input type="file" accept="image/*" id="editFileNow" style="display:none;" onchange="handleEditFile('now')">
            </div>
            <div class="edit-photo-item">
                <label style="font-size:12px;">录取照片</label>
                <div class="edit-photo-box" id="editPhotoOld" onclick="document.getElementById('editFileOld').click()">
                    <span style="line-height:90px;">📷</span>
                </div>
                <input type="file" accept="image/*" id="editFileOld" style="display:none;" onchange="handleEditFile('old')">
            </div>
        </div>
        <div class="edit-btn-row">
            <button class="edit-cancel" onclick="document.getElementById('editOverlay').classList.remove('show')">取消</button>
            <button class="edit-save" onclick="saveEdit()">保存修改</button>
        </div>
    </div>
</div>

<!-- 图片预览弹窗（支付宝长按保存到相册） -->
<div class="img-preview-overlay" id="imgPreview" onclick="closeImgPreview(event)">
    <img id="imgPreviewImg" src="" alt="学籍报告" style="pointer-events:auto;">
    <div class="img-preview-tip" id="imgPreviewTip">👆 长按图片 → 保存到相册</div>
    <button class="img-preview-close" onclick="document.getElementById('imgPreview').classList.remove('show')">关闭</button>
</div>

<script>
// ==================== 状态管理 ====================
var MAX_FORMS = 2;
var formCount = 0;
var photoDataMap = {}; // index -> base64 (现在照片)
var photoDataMapOld = {}; // index -> base64 (录取照片)
var editPhotoNow = ''; // 编辑弹窗中暂存的现在照片
var editPhotoOld = ''; // 编辑弹窗中暂存的录取照片

// ==================== 表单管理 ====================
function createFormCard(index) {
    var card = document.createElement('div');
    card.className = 'form-card';
    card.dataset.index = index;

    var header = document.createElement('div');
    header.className = 'card-index';
    header.textContent = '#' + (index + 1) + ' 账号信息';

    var removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '删除';
    removeBtn.onclick = function() { removeForm(card, index); };

    header.appendChild(removeBtn);

    // 照片区域
    var photoLabel = document.createElement('label');
    photoLabel.textContent = '\uD83D\uDCF7 照片 *';

    var photoArea = document.createElement('div');
    photoArea.className = 'photo-upload-area';

    var preview = document.createElement('div');
    preview.className = 'photo-preview';
    preview.id = 'preview_' + index;
    preview.innerHTML = '<div class="upload-hint"><span class="icon">\uD83D\uDCF7</span>点击上传</div>';

    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.className = 'file-input-hidden';
    fileInput.id = 'fileInput_' + index;
    fileInput.onchange = function(e) { handleFileSelect(index, e); };

    preview.onclick = function() { fileInput.click(); };

    photoArea.appendChild(preview);
    photoArea.appendChild(fileInput);

    // 录取照片（可选）
    var photoOldLabel = document.createElement('label');
    photoOldLabel.innerHTML = '\uD83C\uDF93 录取照片 <span style="color:#999;">(选填)</span>';
    var photoOldArea = document.createElement('div');
    photoOldArea.className = 'photo-upload-area';

    var previewOld = document.createElement('div');
    previewOld.className = 'photo-preview';
    previewOld.id = 'preview_old_' + index;
    previewOld.innerHTML = '<div class="upload-hint"><span class="icon">\uD83D\uDCF7</span>点击上传</div>';

    var fileInputOld = document.createElement('input');
    fileInputOld.type = 'file';
    fileInputOld.accept = 'image/*';
    fileInputOld.className = 'file-input-hidden';
    fileInputOld.id = 'fileInput_old_' + index;
    fileInputOld.onchange = function(e) { handleFileSelectOld(index, e); };

    previewOld.onclick = function() { fileInputOld.click(); };

    photoOldArea.appendChild(previewOld);
    photoOldArea.appendChild(fileInputOld);

    // 包装为一行两列
    var photoRow = document.createElement('div');
    photoRow.className = 'photo-row';
    var photoCol1 = document.createElement('div');
    photoCol1.className = 'photo-col';
    photoCol1.appendChild(photoLabel);
    photoCol1.appendChild(photoArea);
    var photoCol2 = document.createElement('div');
    photoCol2.className = 'photo-col';
    photoCol2.appendChild(photoOldLabel);
    photoCol2.appendChild(photoOldArea);
    photoRow.appendChild(photoCol1);
    photoRow.appendChild(photoCol2);

    card.appendChild(photoRow);

    // 性别
    var genderLabel = document.createElement('label');
    genderLabel.textContent = '\uD83D\uDC64 性别';
    var genderSelect = document.createElement('select');
    genderSelect.id = 'gender_' + index;
    genderSelect.innerHTML = '<option value="\u7537">\u7537</option><option value="\u5973">\u5973</option>';

    // 姓名
    var nameLabel = document.createElement('label');
    nameLabel.innerHTML = '\uD83D\uDC64 姓名 <span style="color:#999;">(选填)</span>';
    var nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.id = 'name_' + index;
    nameInput.placeholder = '不填则自动生成';
    nameInput.style.cssText = 'width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;';

    // 身份证
    var idLabel = document.createElement('label');
    idLabel.innerHTML = '\uD83D\uDCB3 身份证号 <span style="color:#999;">(选填)</span>';
    var idInput = document.createElement('input');
    idInput.type = 'text';
    idInput.id = 'idcard_' + index;
    idInput.placeholder = '不填则自动生成';
    idInput.style.cssText = 'width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;';

    card.appendChild(genderLabel);
    card.appendChild(genderSelect);
    card.appendChild(nameLabel);
    card.appendChild(nameInput);
    card.appendChild(idLabel);
    card.appendChild(idInput);

    return card;
}

function addForm(index) {
    var container = document.getElementById('formsContainer');
    var card = createFormCard(index);
    container.appendChild(card);
    formCount++;
    updateAddBtn();
}

function removeForm(card, index) {
    if (formCount <= 1) { alert('至少保留一张照片表单'); return; }
    delete photoDataMap[index];
    card.parentNode.removeChild(card);
    formCount--;
    updateAddBtn();
    // 重新编号剩余卡片
    reindexForms();
}

function reindexForms() {
    var cards = document.querySelectorAll('.form-card');
    cards.forEach(function(card, idx) {
        var oldIdx = parseInt(card.dataset.index);
        card.dataset.index = idx;
        var header = card.querySelector('.card-index');
        if (header) {
            header.childNodes[0].textContent = '#' + (idx + 1) + ' 账号信息';
        }
        // 更新现在照片相关 id
        document.getElementById('preview_' + oldIdx).id = 'preview_' + idx;
        document.getElementById('fileInput_' + oldIdx).id = 'fileInput_' + idx;
        // 更新录取照片相关 id
        var po = document.getElementById('preview_old_' + oldIdx);
        if (po) po.id = 'preview_old_' + idx;
        var fo = document.getElementById('fileInput_old_' + oldIdx);
        if (fo) fo.id = 'fileInput_old_' + idx;
        // 更新其他 id
        card.querySelector('select').id = 'gender_' + idx;
        card.querySelectorAll('input[type="text"]')[0].id = 'name_' + idx;
        card.querySelectorAll('input[type="text"]')[1].id = 'idcard_' + idx;

        // 旧 photoDataMap 迁移
        if (photoDataMap[oldIdx]) {
            photoDataMap[idx] = photoDataMap[oldIdx];
            delete photoDataMap[oldIdx];
        }
        if (photoDataMapOld[oldIdx]) {
            photoDataMapOld[idx] = photoDataMapOld[oldIdx];
            delete photoDataMapOld[oldIdx];
        }

        // 更新 removeBtn 的 onclick
        var rmBtn = card.querySelector('.remove-btn');
        rmBtn.onclick = function() { removeForm(card, idx); };

        // 更新 fileInput onchange
        var fi = document.getElementById('fileInput_' + idx);
        fi.onchange = function(e) { handleFileSelect(idx, e); };
        var fiOld = document.getElementById('fileInput_old_' + idx);
        if (fiOld) fiOld.onchange = function(e) { handleFileSelectOld(idx, e); };

        // 更新 preview onclick
        var pv = document.getElementById('preview_' + idx);
        pv.onclick = function() { fi.click(); };
        var pvOld = document.getElementById('preview_old_' + idx);
        if (pvOld) pvOld.onclick = function() { fiOld.click(); };
    });
    formCount = cards.length;
}

function updateAddBtn() {
    var btn = document.getElementById('addFormBtn');
    if (formCount >= MAX_FORMS) {
        btn.disabled = true;
        btn.style.opacity = '0.4';
    } else {
        btn.disabled = false;
        btn.style.opacity = '1';
    }
}

function handleFileSelect(index, e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
        photoDataMap[index] = ev.target.result;
        var preview = document.getElementById('preview_' + index);
        if (preview) preview.innerHTML = '<img src="' + ev.target.result + '">';
    };
    reader.readAsDataURL(file);
}

function handleFileSelectOld(index, e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
        photoDataMapOld[index] = ev.target.result;
        var preview = document.getElementById('preview_old_' + index);
        if (preview) preview.innerHTML = '<img src="' + ev.target.result + '">';
    };
    reader.readAsDataURL(file);
}

// ==================== 添加表单按钮 ====================

// ==================== 批量生成 ====================
document.getElementById('generateBtn').addEventListener('click', async function() {
    var btn = this;
    var cards = document.querySelectorAll('.form-card');
    if (cards.length === 0) { alert('请至少添加一张照片'); return; }

    // 检查每张表单是否有照片
    var validIndices = [];
    cards.forEach(function(card) {
        var idx = parseInt(card.dataset.index);
        if (!photoDataMap[idx]) {
            alert('账号 #' + (idx + 1) + ' 请先上传照片');
            return;
        }
        validIndices.push(idx);
    });
    if (validIndices.length === 0) return;
    if (validIndices.length < cards.length) return;

    btn.disabled = true;
    btn.textContent = '⏳ 批量生成中...';

    // 显示进度条
    var progressWrap = document.getElementById('progressWrap');
    var progressFill = document.getElementById('progressFill');
    var progressText = document.getElementById('progressText');
    progressWrap.style.display = 'block';

    var resultsHtml = '';
    var allAccounts = [];

    for (var i = 0; i < validIndices.length; i++) {
        var idx = validIndices[i];
        var name = document.getElementById('name_' + idx).value.trim();
        var idCard = document.getElementById('idcard_' + idx).value.trim();
        var gender = document.getElementById('gender_' + idx).value;

        // 更新进度
        var pct = Math.round(((i) / validIndices.length) * 100);
        progressFill.style.width = pct + '%';
        progressText.innerHTML = '正在生成 ' + (i + 1) + '/' + validIndices.length + ' <span class="pname">' + (name || '#' + (idx + 1)) + '</span>';

        try {
            var body = { name: name, gender: gender, photo: photoDataMap[idx], photo_old: photoDataMapOld[idx] || '' };
            if (idCard) body.id_card = idCard;

            var res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            var data = await res.json();

            if (data.code === 0) {
                var info = data.data;
                allAccounts.push(info);

                resultsHtml += '<div class="result-item">';
                resultsHtml += '<div class="r-name">✅ ' + info.name + '</div>';
                resultsHtml += '<div class="r-detail">';
                resultsHtml += '身份证号：' + info.id_card + '<br>';
                resultsHtml += '学校：' + info.school + ' · ' + info.major + '<br>';
                resultsHtml += '验证码：<span style="font-family:monospace;">' + info.verify_code + '</span>';
                resultsHtml += '</div>';
                resultsHtml += '<div class="r-actions">';
                resultsHtml += '<button class="r-copy" onclick="copyText(\'' + info.name.replace(/'/g, "\\'") + '\\t' + info.id_card + '\')">📋 复制姓名+号码</button>';
                resultsHtml += '<button class="r-dl" onclick="downloadScreenshot(' + info.id + ', \'' + info.name.replace(/'/g, "\\'") + '\')">📥 下载报告</button>';
                resultsHtml += '</div></div>';
            } else {
                resultsHtml += '<div class="result-item" style="border-color:#f5c6cb;background:#fff5f5;">';
                resultsHtml += '<div class="r-name" style="color:#d63031;">❌ 账号 #' + (idx + 1) + ' 生成失败</div>';
                resultsHtml += '<div class="r-detail">' + (data.detail || '未知错误') + '</div></div>';
            }
        } catch(e) {
            resultsHtml += '<div class="result-item" style="border-color:#f5c6cb;background:#fff5f5;">';
            resultsHtml += '<div class="r-name" style="color:#d63031;">❌ 账号 #' + (idx + 1) + ' 出错</div>';
            resultsHtml += '<div class="r-detail">' + e.message + '</div></div>';
        }

        // 小延迟避免并发问题
        await new Promise(function(resolve) { setTimeout(resolve, 200); });
    }

    // 进度完成
    progressFill.style.width = '100%';
    progressText.innerHTML = '✅ 全部完成';

    var resultsArea = document.getElementById('resultsArea');
    resultsArea.innerHTML = resultsHtml;
    resultsArea.style.display = 'flex';

    // 自动复制最后一个生成的账号（姓名+号码，Tab分隔，方便粘贴到 image-editor）
    if (allAccounts.length > 0) {
        var last = allAccounts[allAccounts.length - 1];
        var copyNameId = last.name + '\t' + last.id_card;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(copyNameId).then(function() {
                progressText.innerHTML = '✅ 已自动复制「' + last.name + ' ' + last.id_card + '」';
            }).catch(function() {
                copyTextFallback(copyNameId);
                progressText.innerHTML = '✅ 已自动复制（请手动粘贴）';
            });
        } else {
            copyTextFallback(copyNameId);
        }
        // 自动下载所有截图（延迟依次触发）
        allAccounts.forEach(function(acc, idx) {
            setTimeout(function() {
                downloadScreenshot(acc.id, acc.name);
            }, (idx + 1) * 1500);
        });
    }

    loadAccounts();

    btn.disabled = false;
    btn.textContent = '⚡ 批量生成账号';

    // 3秒后隐藏进度条
    setTimeout(function() {
        progressWrap.style.display = 'none';
        progressFill.style.width = '0%';
    }, 3000);
});

// ==================== 下载截图到相册 ====================
function downloadScreenshot(id, name) {
    var dlBtn = document.getElementById('dlBtn' + id);
    if (dlBtn) { dlBtn.textContent = '⏳'; dlBtn.disabled = true; }
    fetch('/api/user/' + id).then(function(r) { return r.json(); }).then(function(result) {
        if (result.code !== 0 || !result.data) { alert('获取信息失败'); return; }
        var u = result.data;
        // 确保依赖加载完成
        function ensureLibs(cb) {
            if (typeof html2canvas !== 'undefined' && typeof qrcode !== 'undefined') {
                cb();
                return;
            }
            setTimeout(function() { ensureLibs(cb); }, 200);
        }
        ensureLibs(function() {
            buildAndDownloadImage(u);
        });
    }).catch(function(e) {
        alert('网络请求失败：' + e.message);
    }).finally(function() {
        if (dlBtn) { dlBtn.textContent = '📥'; dlBtn.disabled = false; }
    });
}

function buildAndDownloadImage(u) {
    // 学籍状态标准化
    function normalizeStatus(s) {
        if (!s) return '在籍（注册学籍）';
        if (s === '在籍') return '在籍（注册学籍）';
        return s;
    }
    var now = new Date();
    var offset = Math.floor(Math.random() * 4);
    var d = new Date(now); d.setDate(now.getDate() - offset);
    var updateDate = d.getFullYear() + '年' + ('0' + (d.getMonth()+1)).slice(-2) + '月' + ('0' + d.getDate()).slice(-2) + '日';

    // 生成二维码
    var code = u.verify_code || 'AG4FMEZUN9W8YHRL';
    var qrDataUrl = '';
    if (code && typeof qrcode !== 'undefined') {
        try {
            var qr = qrcode(4, 'M');
            qr.addData('https://www.chsi.com.cn/xlcx/bgcx.jsp?code=' + code);
            qr.make();
            var cs = 3, mg = 2;
            var sz = qr.getModuleCount() * cs + mg * 2;
            var cv = document.createElement('canvas');
            cv.width = sz; cv.height = sz;
            var ctx = cv.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, sz, sz);
            for (var r = 0; r < qr.getModuleCount(); r++) {
                for (var c = 0; c < qr.getModuleCount(); c++) {
                    if (qr.isDark(r, c)) { ctx.fillStyle = '#000'; ctx.fillRect(c*cs+mg, r*cs+mg, cs, cs); }

        + allHtml
        + '</div>'

                var link = document.createElement('a');

// ==================== 复制文本 ====================
function copyTextFallback(text) {
    // 方案1：textarea + execCommand（兼容性最好，但需在用户手势内调用）
    try {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.left = '0px';
        ta.style.top = '0px';
        ta.style.opacity = '0';
        ta.style.pointerEvents = 'none';
        ta.style.zIndex = '-1';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        ta.setSelectionRange(0, text.length);
        var ok = false;
        try { ok = document.execCommand('copy'); } catch(e) { ok = false; }
        document.body.removeChild(ta);
        if (ok) return true;
    } catch(e) {}

    // 方案2：selection + execCommand（兜底）
    try {
        var div = document.createElement('div');
        div.textContent = text;
        div.style.position = 'fixed';
        div.style.left = '-9999px';
        div.style.whiteSpace = 'pre';
        document.body.appendChild(div);
        var range = document.createRange();
        range.selectNodeContents(div);
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        var ok2 = false;
        try { ok2 = document.execCommand('copy'); } catch(e) { ok2 = false; }
        document.body.removeChild(div);
        if (ok2) return true;
    } catch(e) {}

    return false;
}

async function copyText(text, el) {
    var success = false;

    // 优先使用现代 Clipboard API（仅安全上下文可用）
    if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {
        try {
            await navigator.clipboard.writeText(text);
            success = true;
        } catch(e) { success = false; }
    }

    // 退化到 execCommand（必须在点击事件的同步调用栈中才有效）
    if (!success) {
        success = copyTextFallback(text);
    }

    // 终极兜底：弹出 prompt 让用户手动复制
    if (!success) {
        prompt('请手动复制以下内容：', text);
        return;
    }

    if (el) { var t = el.textContent; el.textContent = '✅已复制!'; setTimeout(function() { el.textContent = t; }, 1500); }
    else alert('已复制：' + text);
}

// 一键复制全部姓名+号码（每行一个，方便粘贴到 image-editor）

        var lines = result.data.map(function(acc) { return acc.name + '\t' + acc.id_card; }).join('\n');

}

// ==================== 账号列表管理 ====================
// 全部账号数据（搜索用）
var allAccountsData = [];
var currentData = [];   // 当前显示的数据（搜索时是过滤结果，否则是全部）
var currentPage = 1;
var pageSize = 20;

async function loadAccounts() {
    var container = document.getElementById('accountList');
    var countEl = document.getElementById('accountCount');
    try {
        var res = await fetch('/api/users');
        var result = await res.json();
        if (result.code !== 0) {
            container.innerHTML = '<div class="empty-tip">加载失败</div>';
            return;
        }
        var accounts = result.data || [];
        allAccountsData = accounts;
        currentData = accounts;

        if (accounts.length === 0) {
            container.innerHTML = '<div class="empty-tip">暂无账号</div>';
            countEl.textContent = '';
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        countEl.textContent = '(' + accounts.length + '个)';
        currentPage = 1;
        document.getElementById('searchAccounts').value = '';
        document.getElementById('searchResultTip').style.display = 'none';
        renderPage(currentData, 1);
    } catch(e) {
        container.innerHTML = '<div class="empty-tip">加载失败</div>';
    }
}

function renderPage(accounts, page) {
    var container = document.getElementById('accountList');
    var totalPages = Math.ceil(accounts.length / pageSize);
    if (page > totalPages) page = totalPages;
    if (page < 1) page = 1;
    currentPage = page;
    var start = (page - 1) * pageSize;
    var pageAccounts = accounts.slice(start, start + pageSize);
    renderAccountList(pageAccounts, container);
    renderPagination(accounts.length, page, totalPages);
}

function renderPagination(total, page, totalPages) {
    var pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    var h = '<span style="font-size:13px;color:#999;">共 ' + total + ' 条 · ' + totalPages + ' 页</span>';
    h += '<button onclick="goPage(1)" ' + (page===1?'disabled':'') + '>首页</button>';
    h += '<button onclick="goPage(' + (page-1) + ')" ' + (page===1?'disabled':'') + '>上一页</button>';
    h += '<span style="font-size:13px;margin:0 8px;">第 ' + page + ' 页</span>';
    h += '<button onclick="goPage(' + (page+1) + ')" ' + (page===totalPages?'disabled':'') + '>下一页</button>';
    h += '<button onclick="goPage(' + totalPages + ')" ' + (page===totalPages?'disabled':'') + '>末页</button>';
    h += ' <select onchange="pageSize=parseInt(this.value);renderPage(currentData,1)" style="padding:4px;border-radius:4px;border:1px solid #ddd;">';
    h += '<option value="10"' + (pageSize===10?' selected':'') + '>10条/页</option>';
    h += '<option value="20"' + (pageSize===20?' selected':'') + '>20条/页</option>';
    h += '<option value="50"' + (pageSize===50?' selected':'') + '>50条/页</option>';
    h += '</select>';
    pg.innerHTML = h;
}

function goPage(p) { renderPage(currentData, p); }

function renderAccountList(accounts, container) {
    if (!container) container = document.getElementById('accountList');
    if (accounts.length === 0) {
        container.innerHTML = '<div class="empty-tip">没有匹配的账号</div>';
        return;
    }
    var html = '';
    accounts.forEach(function(acc) {
        html += '<div class="acc-item">';
        html += '<div class="avatar">';
        if (acc.photo) html += '<img src="' + acc.photo + '">';
        else html += '<span style="display:flex;align-items:center;justify-content:center;height:100%;color:#ccc;">?</span>';
        html += '</div>';
        html += '<div class="info"><div class="name">' + acc.name + '</div>';
        html += '<div class="detail"><span style="cursor:pointer;color:#4CAF50;text-decoration:underline;font-family:monospace;" onclick="copyText(\'' + acc.name.replace(/'/g, "\\'") + ' ' + acc.id_card + '\',this)" title="点击复制姓名+号码">' + acc.id_card + '</span> · ' + acc.school + '</div></div>';
        html += '<div class="acc-actions"><button class="edit-btn" onclick="openEditModal(' + acc.id + ')" title="编辑">✏️</button><button class="qr-btn" onclick="showQRCode(' + acc.id + ',\'' + acc.name.replace(/'/g, "\\'") + '\')" title="二维码">📱</button><button class="copy-btn" onclick="copyAccount(' + acc.id + ',this)" title="复制">📋</button><button class="dl-btn" id="dlBtn' + acc.id + '" onclick="downloadScreenshot(' + acc.id + ',\'' + acc.name.replace(/'/g, "\\'") + '\')" title="下载报告">📥</button><button class="del-btn" onclick="deleteAccount(' + acc.id + ')" title="删除">🗑️</button></div>';
        html += '</div>';
    });
    container.innerHTML = html;
}

// 按姓名模糊搜索账号
function filterAccounts() {
    var keyword = document.getElementById('searchAccounts').value.trim().toLowerCase();
    var tipEl = document.getElementById('searchResultTip');
    if (!keyword) {
        currentData = allAccountsData;
        renderPage(currentData, 1);
        if (tipEl) tipEl.style.display = 'none';
        return;
    }
    var filtered = allAccountsData.filter(function(acc) {
        return (acc.name || '').toLowerCase().indexOf(keyword) !== -1;
    });
    currentData = filtered;
    if (tipEl) { tipEl.style.display = 'block'; tipEl.textContent = '匹配到 ' + filtered.length + ' 个结果（共 ' + allAccountsData.length + ' 个）'; }
    renderPage(currentData, 1);
}

async function deleteAccount(id) {
    if (!confirm('确定要删除此账号吗？')) return;
    try {
        var res = await fetch('/api/user/' + id, { method: 'DELETE' });
        var data = await res.json();
        if (data.code !== 0) { alert('删除失败'); return; }
    } catch(e) {
        alert('删除失败：' + e.message);
        return;
    }
    loadAccounts();
}

async function batchDeleteRecent(count) {
    count = count || 100;
    if (!confirm('⚠️ 确定要删除最近 ' + count + ' 条账号吗？此操作不可恢复！')) return;
    if (!confirm('再次确认：真的要删除吗？')) return;
    try {
        var res = await fetch('/api/users/batch-delete?count=' + count, { method: 'DELETE' });
        var data = await res.json();
        if (data.code === 0) {
            alert('已删除 ' + data.deleted + ' 条');
            loadAccounts();
        } else {
            alert('删除失败');
        }
    } catch(e) {
        alert('删除失败：' + e.message);
    }
}

function copyAccount(id, btn) {
    // 直接从 DOM 提取，保持同步调用（execCommand 必须在用户手势中）
    var item = btn.closest('.acc-item');
    if (!item) return;
    var nameEl = item.querySelector('.name');
    var idEl = item.querySelector('.detail span');
    var name = nameEl ? nameEl.textContent.trim() : '';
    var idCard = idEl ? idEl.textContent.trim() : '';
    if (name && idCard) {
        copyText(name + ' ' + idCard, btn);
    } else {
        alert('获取信息失败');
    }
}

// ==================== 二维码弹窗 ====================
function showQRCode(id, name) {
    var overlay = document.getElementById('qrOverlay');
    var canvasDiv = document.getElementById('qrCanvas');
    var urlDiv = document.getElementById('qrUrl');
    var nameEl = document.getElementById('qrName');

    var url = window.location.origin + '/mobile-verify.html?id=' + id;
    nameEl.textContent = name + ' 的报告';
    urlDiv.textContent = url;

    if (typeof qrcode === 'undefined') {
        canvasDiv.innerHTML = '<div style="padding:40px;color:#999;">二维码库加载中...</div>';
        overlay.classList.add('show');
        // 等待加载
        var check = setInterval(function() {
            if (typeof qrcode !== 'undefined') {
                clearInterval(check);
                genQR(url, canvasDiv);
            }
        }, 300);
        return;
    }
    genQR(url, canvasDiv);
    overlay.classList.add('show');
}

function genQR(data, container) {
    container.innerHTML = '';
    var qr = qrcode(4, 'M');
    qr.addData(data);
    qr.make();
    var cs = 4, mg = 8;
    var sz = qr.getModuleCount() * cs + mg * 2;
    var cv = document.createElement('canvas');
    cv.width = sz; cv.height = sz;
    cv.style.width = '200px'; cv.style.height = '200px';
    var ctx = cv.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, sz, sz);
    for (var r = 0; r < qr.getModuleCount(); r++) {
        for (var c = 0; c < qr.getModuleCount(); c++) {
            if (qr.isDark(r, c)) {
                ctx.fillStyle = '#000';
                ctx.fillRect(c * cs + mg, r * cs + mg, cs, cs);
            }
        }
    }
    container.appendChild(cv);
}

function closeQR(e) {
    if (e.target === document.getElementById('qrOverlay')) {
        document.getElementById('qrOverlay').classList.remove('show');
    }
}

// ==================== 编辑弹窗 ====================
async function openEditModal(id) {
    document.getElementById('editId').value = id;
    document.getElementById('editName').value = '';
    document.getElementById('editIdCard').value = '';
    editPhotoNow = '';
    editPhotoOld = '';
    var boxNow = document.getElementById('editPhotoNow');
    var boxOld = document.getElementById('editPhotoOld');
    if (boxNow) boxNow.innerHTML = '<span style="line-height:90px;">📷</span>';
    if (boxOld) boxOld.innerHTML = '<span style="line-height:90px;">📷</span>';
    document.getElementById('editFileNow').value = '';
    document.getElementById('editFileOld').value = '';

    document.getElementById('editOverlay').classList.add('show');

    try {
        var res = await fetch('/api/user/' + id);
        var result = await res.json();
        if (result.code !== 0 || !result.data) {
            alert('加载账号失败');
            return;
        }
        var acc = result.data;

        document.getElementById('editName').value = acc.name || '';
        document.getElementById('editIdCard').value = acc.id_card || '';

        // 现在照片
        editPhotoNow = acc.photo || '';
        if (editPhotoNow) {
            boxNow.innerHTML = '<img src="' + editPhotoNow + '">';
        } else {
            boxNow.innerHTML = '<span style="line-height:90px;">📷</span>';
        }

        // 录取照片
        editPhotoOld = acc.photo_old || '';
        if (editPhotoOld) {
            boxOld.innerHTML = '<img src="' + editPhotoOld + '">';
        } else {
            boxOld.innerHTML = '<span style="line-height:90px;">📷</span>';
        }
    } catch(e) {
        alert('加载账号失败：' + e.message);
    }
}

function handleEditFile(type) {
    var input = document.getElementById(type === 'now' ? 'editFileNow' : 'editFileOld');
    var box = document.getElementById(type === 'now' ? 'editPhotoNow' : 'editPhotoOld');
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
        if (type === 'now') {
            editPhotoNow = ev.target.result;
        } else {
            editPhotoOld = ev.target.result;
        }
        box.innerHTML = '<img src="' + ev.target.result + '">';
    };
    reader.readAsDataURL(file);
}

async function saveEdit() {
    var id = document.getElementById('editId').value;
    var name = document.getElementById('editName').value.trim();
    var idCard = document.getElementById('editIdCard').value.trim();

    var body = {};
    if (name) body.name = name;
    if (idCard) body.id_card = idCard;
    if (editPhotoNow) body.photo = editPhotoNow;
    if (editPhotoOld) body.photo_old = editPhotoOld;

    try {
        var res = await fetch('/api/user/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        var data = await res.json();
        if (data.code === 0) {
            document.getElementById('editOverlay').classList.remove('show');
            loadAccounts(); // 刷新列表
        } else {
            alert('保存失败');
        }
    } catch(e) {
        alert('保存失败：' + e.message);
    }
}

function closeEditOverlay(e) {
    if (e.target === document.getElementById('editOverlay')) {
        document.getElementById('editOverlay').classList.remove('show');
    }
}

loadAccounts();
