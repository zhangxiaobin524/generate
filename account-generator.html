<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号生成 - 学信档案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #FAFCFB;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 520px; margin: 0 auto; }
        h2 { text-align: center; color: #2db475; margin-bottom: 20px; font-size: 22px; }
        .card {
            background: white; border-radius: 14px; padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px;
        }
        .card h3 { font-size: 16px; color: #333; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; margin-top: 14px; }
        input, select {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; outline: none;
        }
        input:focus, select:focus { border-color: #2db475; }
        .photo-area {
            margin: 10px 0; display: flex; align-items: center; gap: 15px;
        }
        .photo-preview {
            width: 80px; height: 100px; border: 2px dashed #ddd; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; font-size: 11px; overflow: hidden; background: #fafafa; flex-shrink: 0;
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 18px; transition: all 0.2s;
        }
        .btn-green { background: #2db475; color: white; }
        .btn-green:hover { background: #25a065; }
        .btn-green:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-small {
            padding: 6px 14px; font-size: 12px; border-radius: 6px;
            background: #2db475; color: white; border: none; cursor: pointer;
        }
        .btn-small:hover { background: #25a065; }
        .btn-login {
            display: inline-block; margin-top: 10px; color: #2db475;
            text-decoration: none; font-size: 14px; font-weight: 500;
        }
        .btn-login:hover { text-decoration: underline; }
        .generated-info {
            margin-top: 16px; padding: 16px; background: #f0faf5; border-radius: 10px;
            border: 1px solid #d4edda; display: none;
        }
        .gen-row { display: flex; padding: 3px 0; font-size: 13px; }
        .gen-row .lbl { width: 75px; color: #888; flex-shrink: 0; }
        .gen-row .val { flex: 1; color: #333; }
        .account-list { margin-top: 12px; }
        .acc-item {
            display: flex; align-items: center; padding: 10px 12px;
            background: #fafafa; border-radius: 8px; margin-bottom: 6px; border: 1px solid #eee;
        }
        .acc-item .avatar {
            width: 36px; height: 36px; border-radius: 50%; background: #eee;
            margin-right: 12px; overflow: hidden; flex-shrink: 0;
        }
        .acc-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .acc-item .info { flex: 1; }
        .acc-item .name { font-size: 14px; font-weight: 600; color: #333; }
        .acc-item .detail { font-size: 11px; color: #999; }
        .acc-item .del-btn {
            padding: 4px 10px; background: #ff4444; color: white;
            border: none; border-radius: 4px; font-size: 11px; cursor: pointer;
        }
        .acc-item .copy-btn {
            padding: 4px 10px; background: #2db475; color: white;
            border: none; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 4px;
        }
        .acc-item .dl-btn {
            padding: 4px 10px; background: #555; color: white;
            border: none; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 4px;
        }
        .empty-tip { text-align: center; color: #ccc; font-size: 13px; padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📋 账号管理</h2>

    <div class="card">
        <h3>生成新账号</h3>
        <label>📷 头像 <span style="color:red;">*</span></label>
        <div class="photo-area">
            <div class="photo-preview" id="photoPreview">
                <span>点击上传</span>
            </div>
            <input type="file" id="photoUpload" accept="image/*" style="display:none">
            <span style="font-size:12px;color:#999;">支持 JPG/PNG</span>
        </div>
        <label>性别</label>
        <select id="inGender"><option value="男">男</option><option value="女">女</option></select>
        <label>姓名 <span style="color:#999;">(选填)</span></label>
        <input type="text" id="inName" placeholder="不填则自动生成" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;">
        <label>身份证号 <span style="color:#999;">(选填)</span></label>
        <input type="text" id="inIdCard" placeholder="不填则自动生成" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;">
        <script>
            // 姓名由后端生成，此处为空（兼容旧代码）
        </script>
        <button class="btn btn-green" id="generateBtn">⚡ 生成账号</button>
        <div class="generated-info" id="generatedInfo"></div>
    </div>

    <div class="card">
        <h3>已生成账号 <span id="accountCount" style="color:#999;font-weight:400;"></span></h3>
        <div id="accountList"><div class="empty-tip">暂无账号，请先生成一个</div></div>
        <div style="text-align:center;margin-top:12px;">
            <a href="login.html" class="btn-login">→ 去登录</a>
        </div>
    </div>
</div>

<script>
var photoData = '';

document.getElementById('photoPreview').addEventListener('click', function() {
    document.getElementById('photoUpload').click();
});
document.getElementById('photoUpload').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
        photoData = ev.target.result;
        var preview = document.getElementById('photoPreview');
        preview.innerHTML = '<img src="' + photoData + '">';
    };
    reader.readAsDataURL(file);
});

document.getElementById('generateBtn').addEventListener('click', async function() {
    var name = document.getElementById('inName').value.trim();
    var idCard = document.getElementById('inIdCard').value.trim();
    var gender = document.getElementById('inGender').value;
    if (!photoData) { alert('请上传头像'); return; }
    this.disabled = true;
    this.textContent = '⏳ 生成中...';
    try {
        var body = {name: name, gender: gender, photo: photoData};
        if (idCard) body.id_card = idCard;
        var res = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        var data = await res.json();
        if (data.code === 0) {
            var info = data.data;
            var html = '<div style="font-weight:600;color:#2db475;margin-bottom:8px;">✅ 账号已生成</div>';
            html += '<div class="gen-row"><span class="lbl">姓名</span><span class="val">' + info.name + '</span></div>';
            html += '<div class="gen-row"><span class="lbl">性别</span><span class="val">' + info.gender + '</span></div>';
            html += '<div class="gen-row"><span class="lbl">身份证号</span><span class="val">' + info.id_card + '</span></div>';
            html += '<div class="gen-row"><span class="lbl">出生日期</span><span class="val">' + info.birth + '</span></div>';
            html += '<div class="gen-row"><span class="lbl">学校</span><span class="val">' + info.school + '</span></div>';
            html += '<div class="gen-row"><span class="lbl">专业</span><span class="val">' + info.major + '</span></div>';
            html += '<div class="gen-row"><span class="lbl">验证码</span><span class="val" style="font-family:monospace;">' + info.verify_code + '</span></div>';
            html += '<div style="margin-top:12px;display:flex;gap:8px;"><button onclick="copyNameIdCard(\'' + info.name.replace(/'/g, "\\'") + '\',\'' + info.id_card + '\')" style="flex:1;padding:10px;background:#2db475;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;">📋 复制姓名和身份证号</button></div>';
            document.getElementById('generatedInfo').innerHTML = html;
            document.getElementById('generatedInfo').style.display = 'block';
            loadAccounts();
        } else {
            alert(data.detail || '生成失败');
        }
    } catch(e) {
        alert('网络错误：' + e.message);
    } finally {
        this.disabled = false;
        this.textContent = '⚡ 生成账号';
    }
});

// 复制姓名和身份证号
function copyNameIdCard(name, idCard) {
    var text = name + ' ' + idCard;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
            alert('已复制：' + text);
        });
    } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('已复制：' + text);
    }
}

// 加载账号列表（从后端API获取）
async function loadAccounts() {
    var container = document.getElementById('accountList');
    var countEl = document.getElementById('accountCount');
    try {
        var res = await fetch('/api/users');
        var result = await res.json();
        if (result.code !== 0) {
            container.innerHTML = '<div class="empty-tip">加载失败</div>';
            return;
        }
        var accounts = result.data || [];

        if (accounts.length === 0) {
            container.innerHTML = '<div class="empty-tip">暂无账号</div>';
            countEl.textContent = '';
            return;
        }

        countEl.textContent = '(' + accounts.length + '个)';
        var html = '';
        accounts.forEach(function(acc) {
            html += '<div class="acc-item">';
            html += '<div class="avatar">';
            if (acc.photo) html += '<img src="' + acc.photo + '">';
            else html += '<span style="display:flex;align-items:center;justify-content:center;height:100%;color:#ccc;">?</span>';
            html += '</div>';
            html += '<div class="info"><div class="name">' + acc.name + '</div>';
            html += '<div class="detail">' + acc.id_card + ' · ' + acc.school + '</div></div>';
            html += '<button class="copy-btn" onclick="copyAccount(' + acc.id + ')">复制</button><button class="dl-btn" onclick="downloadPdf(' + acc.id + ')">下载</button><button class="del-btn" onclick="deleteAccount(' + acc.id + ')">删除</button>';
            html += '</div>';
        });
        container.innerHTML = html;
    } catch(e) {
        container.innerHTML = '<div class="empty-tip">加载失败</div>';
    }
}

// 删除指定数据库ID的账号
async function deleteAccount(id) {
    if (!confirm('确定要删除此账号吗？')) return;
    try {
        var res = await fetch('/api/user/' + id, { method: 'DELETE' });
        var data = await res.json();
        if (data.code !== 0) { alert('删除失败'); return; }
    } catch(e) {
        alert('删除失败：' + e.message);
        return;
    }
    loadAccounts();
}

// 复制姓名和身份证号
function copyAccount(id) {
    fetch('/api/user/' + id).then(function(r) { return r.json(); }).then(function(result) {
        if (result.code !== 0 || !result.data) { alert('获取信息失败'); return; }
        var acc = result.data;
        var text = acc.name + ' ' + acc.id_card;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
            alert('已复制：' + text);
        });
    } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('已复制：' + text);
    }
    });
}

// 下载PDF报告
function downloadPdf(id) {
    var btn = event.target;
    btn.textContent = '⏳';
    fetch('/api/user/' + id).then(function(r) { return r.json(); }).then(function(result) {
        if (result.code !== 0 || !result.data) { btn.textContent = '下载'; alert('获取信息失败'); return; }
        var u = result.data;
        // 动态加载html2canvas和jsPDF
        function loadScript(src, cb) {
            var s = document.createElement('script'); s.src = src; s.onload = cb; document.head.appendChild(s);
        }
        loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', function() {
            loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js', function() {
                loadScript('https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js', function() {
                    buildAndDownloadPdf(u, btn);
                });
            });
        });
    }).catch(function(e) {
        btn.textContent = '下载';
        alert('获取信息失败：' + e.message);
    });
}

function buildAndDownloadPdf(u, btn) {
    var day = 16 + Math.floor(Math.random() * 5);
    var updateDate = '2026年06月' + (day < 10 ? '0' : '') + day + '日';
    var code = u.verify_code || 'AG4FMEZUN9W8YHRL';
    // 生成二维码
    var qrDataUrl = '';
    if (code && typeof qrcode !== 'undefined') {
        try {
            var qr = qrcode(4, 'M');
            qr.addData('https://www.chsi.com.cn/xlcx/bgcx.jsp?code=' + code);
            qr.make();
            var cs = 3, mg = 2;
            var sz = qr.getModuleCount() * cs + mg * 2;
            var cv = document.createElement('canvas');
            cv.width = sz; cv.height = sz;
            var ctx = cv.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, sz, sz);
            for (var r = 0; r < qr.getModuleCount(); r++) {
                for (var c = 0; c < qr.getModuleCount(); c++) {
                    if (qr.isDark(r, c)) { ctx.fillStyle = '#000'; ctx.fillRect(c*cs+mg, r*cs+mg, cs, cs); }
                }
            }
            qrDataUrl = cv.toDataURL('image/png');
        } catch(e) {}
    }
    var fields = [
        ['姓名', u.name || ''], ['性别', u.gender || ''], ['出生日期', u.birth || ''],
        ['民族', u.ethnic || '汉族'], ['学校名称', u.school || ''], ['层次', u.level || '本科'],
        ['专业', u.major || ''], ['学制', u.duration || '4年'], ['学历类别', u.degree_type || '普通高等教育'],
        ['学习形式', u.study_form || '普通全日制'], ['分院', u.college || ''], ['系所', u.dept || ''],
        ['入学日期', u.enroll_date || ''], ['学籍状态', u.status || '在籍'], ['离校日期', u.grad_date || '']
    ];
    var allHtml = '';
    for (var i = 0; i < fields.length; i++) {
        allHtml += '<div style="display:flex;margin-bottom:10px;align-items:baseline;"><div style="width:65px;color:#888;font-size:13px;flex-shrink:0;">' + fields[i][0] + '</div><div style="flex:1;padding-left:45px;padding-right:150px;color:#222;font-size:13px;">' + fields[i][1] + '</div></div>';
    }
    var html = '<div style="width:650px;background:#FAFCFB url(bg_pattern.jpg) no-repeat 0 0 / 100% 100%;padding:50px 65px 30px 65px;box-sizing:border-box;color:#222;font-family:\'Helvetica Neue\',Helvetica,\'PingFang SC\',\'Microsoft YaHei\',sans-serif;">'
        + '<div style="width:100%;">'
        + '<h4 style="font-size:27px;font-weight:700;text-align:center;color:#000;margin-top:20px;margin-bottom:4px;letter-spacing:0.5px;">教育部学籍在线验证报告</h4>'
        + '<div style="font-size:12px;color:#999;text-align:center;margin-bottom:30px;">更新日期：' + updateDate + '</div>'
        + '<div style="width:100%;position:relative;">'
        + '<div style="position:absolute;right:30px;top:0;width:100px;height:130px;border:1px solid #b0b0b0;background:#f4f9f5;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:11px;color:#aaa;">' + (u.photo ? '<img src="' + u.photo + '" style="width:100%;height:100%;object-fit:cover;">' : '暂无照片') + '</div>'
        + allHtml
        + '</div>'
        // 在线验证码区域
        + '<div style="margin:120px 0 10px 0;border:1px solid #c2dec9;background:#f6fbf8;padding:10px;display:flex;gap:12px;align-items:center;width:520px;">'
        + '<div style="flex-shrink:0;">' + (qrDataUrl ? '<img src="' + qrDataUrl + '" style="width:68px;height:68px;display:block;">' : '<div style="width:68px;height:68px;border:1px solid #b5ccbe;background:white;"></div>') + '</div>'
        + '<div style="flex:1;font-size:11px;line-height:1.6;color:#333;">'
        + '<div><span style="font-weight:600;color:#333;">在线验证码</span> <span style="font-family:Arial,sans-serif;font-size:18px;font-weight:700;color:#000;margin-left:6px;">' + code + '</span></div>'
        + '<div>① 验证报告在线查验网址：https://www.chsi.com.cn/xlcx/bgcx.jsp</div>'
        + '<div>② 使用学信网App扫描二维码验证</div></div></div>'
        // 注意事项 - 正常流
        + '<div style="font-size:10px;color:#444;line-height:1.6;margin-top:10px;"><div style="font-weight:bold;color:#222;margin-bottom:2px;font-size:10.5px;">注意事项：</div>'
        + '<div style="margin-bottom:1px;">1、《学籍在线验证报告》是教育部学籍电子注册备案的查询结果。</div>'
        + '<div style="margin-bottom:1px;">2、报告内容如有修改，请以最新在线验证的内容为准。</div>'
        + '<div style="margin-bottom:1px;">3、未经学籍信息权属人同意，不得将报告用于违背权属人意愿之用途。</div>'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;white-space:nowrap;"><div style="flex:1;white-space:nowrap;font-size:9px;">4、报告在线验证有效期由报告权属人设置（1~6个月），其在报告验证到期前可再次延长验证有效期。</div>'
        + '<div style="flex-shrink:0;margin-left:8px;display:flex;align-items:center;gap:4px;"><img src="xxw.png" style="height:22px;width:auto;"><span style="color:#888;font-size:12px;font-weight:600;">CHSI</span></div></div></div></div></div>';

    var div = document.createElement('div');
    // 手机端兼容：用 absolute 替代 fixed
    div.style.cssText = 'position:absolute;left:-9999px;top:0;width:650px;z-index:-1;';
    div.innerHTML = html;
    document.body.appendChild(div);
    div.offsetHeight;
    var divH = div.scrollHeight || 650;
    div.style.height = divH + 'px';

    setTimeout(function() {
        html2canvas(div, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#FAFCFB', width: 650, height: divH }).then(function(canvas) {
            document.body.removeChild(div);
            var imgData = canvas.toDataURL('image/jpeg', 0.95);
            var { jsPDF } = window.jspdf;
            var pdf = new jsPDF('p', 'mm', 'a4');
            var pw = pdf.internal.pageSize.getWidth();
            pdf.addImage(imgData, 'JPEG', 0, 0, pw, pw / canvas.width * canvas.height);
            pdf.save('教育部学籍在线验证报告_' + (u.name || 'unknown') + '.pdf');
            btn.textContent = '下载';
        }).catch(function(e) {
            document.body.removeChild(div);
            btn.textContent = '下载';
            alert('生成PDF失败：' + e.message);
        });
    }, 300);
}

loadAccounts();
</script>
</body>
</html>
