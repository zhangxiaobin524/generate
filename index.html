<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学信网 - 首页</title>
    <script>
        // 自动跳转到学信档案首页（如有登录）或登录页
        (function() {
            var uid = localStorage.getItem('xuexin_user_id');
            if (uid) {
                window.location.replace('archive.html');
            } else {
                window.location.replace('login.html');
            }
        })();
    </script>
</head>
<body>
    <p style="text-align:center;margin-top:40vh;color:#999;font-family:sans-serif;">跳转中...</p>
</body>
