<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>登录_学信网</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        body {
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .login-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 20px;
        }
        /* Logo */
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 60px;
            width: 60px;
            object-fit: contain;
        }
        .logo-text {
            font-size: 32px;
            font-weight: bold;
            color: #2db475;
            margin-left: 8px;
        }
        /* 表单 */
        .form-group {
            width: 100%;
            margin-bottom: 16px;
        }
        .form-group input {
            width: 100%;
            height: 48px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #00bac7;
        }
        .form-group input::placeholder {
            color: #b0b0b0;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
            text-align: center;
        }
        .btn-login {
            width: 100%;
            height: 48px;
            background: #00bac7;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #00a0ab;
        }
        .btn-login:disabled {
            background: #88d4dc;
            cursor: not-allowed;
        }
        .form-links {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            width: 100%;
        }
        .form-links a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        .form-links a:hover {
            color: #00bac7;
        }
        /* 底部 */
        .footer {
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }
        .footer-links {
            margin-bottom: 8px;
        }
        .footer-links a {
            color: #999;
            text-decoration: none;
            margin: 0 8px;
        }
        @media (max-width: 420px) {
            .login-container { padding: 30px 16px 16px; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <!-- Logo -->
    <div class="logo">
        <img src="xxw.png" alt="">
        <span class="logo-text">学信网</span>
    </div>

    <!-- 账号密码登录 -->
    <div style="width:100%;margin-top:24px;">
        <div class="form-group">
            <input type="text" id="loginName" placeholder="手机号/身份证号/邮箱">
        </div>
        <div class="form-group">
            <input type="password" id="loginIdCard" placeholder="密码">
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button class="btn-login" id="loginBtn">登录</button>
        <div class="form-links">
            <a href="#">找回密码</a>
            <a href="account-generator.html">注册</a>
        </div>
    </div>
</div>

<!-- 底部 -->
<div class="footer">
    <div class="footer-links">
        <a href="#">首页</a>
        <a href="#">帮助中心</a>
        <a href="#">联系我们</a>
    </div>
    <div class="footer-copy">Copyright &copy; 2003-2026 学信网 All Rights Reserved</div>
</div>

<script>
// ==================== 账号密码登录 ====================
document.getElementById('loginBtn').addEventListener('click', async function() {
    var name = document.getElementById('loginName').value.trim();
    var idCard = document.getElementById('loginIdCard').value.trim();
    var errorEl = document.getElementById('errorMsg');
    if (!name || !idCard) {
        errorEl.textContent = '请填写用户名和密码';
        errorEl.style.display = 'block';
        return;
    }
    this.disabled = true;
    this.textContent = '登录中...';
    try {
        var res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, id_card: idCard})
        });
        var data = await res.json();
        if (data.code === 0) {
            doLogin(data.data);
        } else {
            throw new Error(data.detail || '登录失败');
        }
    } catch (e) {
        errorEl.textContent = e.message || '网络错误，请重试';
        errorEl.style.display = 'block';
    } finally {
        this.disabled = false;
        this.textContent = '登录';
    }
});

function doLogin(user) {
    localStorage.setItem('xuexin_user_id', user.id);
    localStorage.setItem('xuexin_user_name', user.name);
    localStorage.setItem('xuexin_id_card', user.id_card);
    window.location.href = 'archive.html';
}
</script>
</body>
</html>
