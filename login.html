<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>登录_学信网</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        body {
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .login-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 20px;
        }
        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }
        .logo img {
            width: 42px;
            height: 42px;
            display: block;
            margin-right: 6px;
        }
        .logo-text {
            font-family: SimSun, "Songti SC", "STSong", "AR PL New Sung", "WenQuanYi Bitmap Song", serif;
            font-size: 36px;
            font-weight: 900;
            line-height: 45.9px;
            color: #333;
            text-align: center;
        }
        /* 提示文字 */
        .hint {
            font-size: 14px;
            color: #999;
            text-align: center;
            margin-bottom: 30px;
        }
        .hint a {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "WenQuanYi Micro Hei", Arial, SimSun, "sans-serif";
            font-size: 16px;
            font-weight: 400;
            line-height: 31.86px;
            color: rgb(96, 101, 110);
            text-decoration: none;
            cursor: pointer;
            -webkit-font-smoothing: antialiased;
        }
        /* 登录表单 */
        .login-form {
            width: 100%;
            max-width: 380px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            outline: none;
            font-size: 15px;
            color: #333;
            background: #fff;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #00bac7;
        }
        .form-group input::placeholder {
            color: #ccc;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin: 12px 0;
            display: none;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            border: none;
            border-radius: 4px;
            background: #00bac7;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #09c7d4;
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* 底部链接 */
        .form-links {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            padding: 0 4px;
        }
        .form-links a {
            font-size: 14px;
            color: #666;
            text-decoration: none;
        }
        .form-links a:hover {
            color: #00bac7;
        }
        /* 页面底部 */
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: auto;
        }
        .footer-links {
            margin-bottom: 8px;
        }
        .footer-links a {
            font-size: 13px;
            color: #999;
            text-decoration: none;
            margin: 0 10px;
        }
        .footer-links a:hover {
            color: #00bac7;
        }
        .footer-copy {
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>
<div class="login-container">
    <!-- Logo -->
    <div class="logo">
        <img src="xxw.png" alt="">
        <span class="logo-text">学信网</span>
    </div>
    
    <!-- 提示 -->
    <div class="hint">请使用 <a href="#">学信网账号</a> 进行登录</div>
    
    <!-- 表单 -->
    <div class="login-form">
        <div class="error-msg" id="errorMsg"></div>
        <div class="form-group">
            <input type="text" id="loginName" placeholder="手机号/身份证号/邮箱">
        </div>
        <div class="form-group">
            <input type="password" id="loginIdCard" placeholder="密码">
        </div>
        <button class="btn-login" id="loginBtn">登录</button>
        <div class="form-links">
            <a href="#">找回密码</a>
            <a href="account-generator.html">注册</a>
        </div>
    </div>
</div>

<!-- 底部 -->
<div class="footer">
    <div class="footer-links">
        <a href="#">首页</a>
        <a href="#">帮助中心</a>
        <a href="#">联系我们</a>
    </div>
    <div class="footer-copy">Copyright &copy; 2003-2026 学信网 All Rights Reserved</div>
</div>

<script>
document.getElementById('loginBtn').addEventListener('click', async function() {
    var name = document.getElementById('loginName').value.trim();
    var idCard = document.getElementById('loginIdCard').value.trim();
    var errorEl = document.getElementById('errorMsg');
    if (!name || !idCard) {
        errorEl.textContent = '请填写用户名和密码';
        errorEl.style.display = 'block';
        return;
    }
    this.disabled = true;
    this.textContent = '登录中...';
    try {
        var res = await fetch('http://127.0.0.1:9002/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, id_card: idCard})
        });
        var data = await res.json();
        if (data.code === 0) {
            localStorage.setItem('xuexin_user_id', data.data.id);
            localStorage.setItem('xuexin_user_name', data.data.name);
            localStorage.setItem('xuexin_id_card', data.data.id_card);
            window.location.href = 'list.html';
        } else {
            throw new Error(data.detail || '登录失败');
        }
    } catch (e) {
        errorEl.textContent = e.message || '网络错误，请重试';
        errorEl.style.display = 'block';
    } finally {
        this.disabled = false;
        this.textContent = '登录';
    }
});
</script>
</body>
</html>
